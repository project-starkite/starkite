version: 2

builds:
  - id: kitecmd
    dir: ./base
    main: .
    binary: kitecmd
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/project-starkite/starkite/base/version.Version={{.Version}}
      - -X github.com/project-starkite/starkite/base/version.BuildTime={{.Date}}
      - -X github.com/project-starkite/starkite/base/version.GitCommit={{.Commit}}

  - id: kitecloud
    dir: ./cloud
    main: .
    binary: kitecloud
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/project-starkite/starkite/base/version.Version={{.Version}}
      - -X github.com/project-starkite/starkite/base/version.BuildTime={{.Date}}
      - -X github.com/project-starkite/starkite/base/version.GitCommit={{.Commit}}
      - -X github.com/project-starkite/starkite/base/version.Edition=cloud

  - id: kiteai
    dir: ./ai
    main: .
    binary: kiteai
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/project-starkite/starkite/base/version.Version={{.Version}}
      - -X github.com/project-starkite/starkite/base/version.BuildTime={{.Date}}
      - -X github.com/project-starkite/starkite/base/version.GitCommit={{.Commit}}
      - -X github.com/project-starkite/starkite/base/version.Edition=ai

  - id: kite
    dir: ./allkite
    main: .
    binary: kite
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/project-starkite/starkite/base/version.Version={{.Version}}
      - -X github.com/project-starkite/starkite/base/version.BuildTime={{.Date}}
      - -X github.com/project-starkite/starkite/base/version.GitCommit={{.Commit}}
      - -X github.com/project-starkite/starkite/base/version.Edition=all

archives:
  - id: kitecmd
    ids:
      - kitecmd
    formats:
      - binary
    name_template: "kitecmd-{{ .Os }}-{{ .Arch }}"

  - id: kitecloud
    ids:
      - kitecloud
    formats:
      - binary
    name_template: "kitecloud-{{ .Os }}-{{ .Arch }}"

  - id: kiteai
    ids:
      - kiteai
    formats:
      - binary
    name_template: "kiteai-{{ .Os }}-{{ .Arch }}"

  - id: kite
    ids:
      - kite
    formats:
      - binary
    name_template: "kite-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: vladimirvivien
    name: starkite
  prerelease: auto
