name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to use for image (e.g. v0.1.0-rc1). Skips goreleaser; image-only run."
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write   # cosign keyless signing via Sigstore

jobs:
  goreleaser:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  image:
    runs-on: ubuntu-latest
    needs: [goreleaser]
    # On tag push: runs after goreleaser succeeds.
    # On workflow_dispatch: goreleaser is skipped; `always()` lets this proceed.
    if: |
      always() &&
      (needs.goreleaser.result == 'success' || needs.goreleaser.result == 'skipped')
    env:
      KO_DOCKER_REPO: ghcr.io/project-starkite/kite
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install ko
        uses: ko-build/setup-ko@v0.9
        with:
          version: v0.18.0

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag and version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # Strip leading "v" for VERSION ldflag (e.g. v0.1.0 → 0.1.0).
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          BUILD_TIME: ${{ github.event.repository.updated_at }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          DIGEST=$(ko build ./allkite \
            --bare \
            --tags="${{ steps.meta.outputs.tag }},latest" \
            --platform=linux/amd64,linux/arm64 \
            --sbom=spdx \
            --image-refs=image-refs.txt)
          # ko prints the full digest reference on the last line.
          echo "ref=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Sign image (cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes "${{ steps.build.outputs.ref }}"

      - name: Smoke test image
        run: |
          set -euo pipefail
          docker pull "${{ steps.build.outputs.ref }}"
          # The image has no shell; invoke the kite binary directly.
          docker run --rm "${{ steps.build.outputs.ref }}" --version
          # Run the permission tests via a bind mount so they exist inside the container.
          docker run --rm \
            -v "$PWD/tests:/work/tests:ro" \
            -w /work \
            "${{ steps.build.outputs.ref }}" \
            test tests/permissions_test.star

      - name: Verify signature
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign verify "${{ steps.build.outputs.ref }}" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/release\\.yml@refs/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
