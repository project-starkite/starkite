name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: |
            libkite/go.sum
            base/go.sum
            cloud/go.sum
            ai/go.sum
            allkite/go.sum
            wasm/go.sum

      - name: Build libkite
        run: go build -v ./...
        working-directory: libkite

      - name: Build base
        run: go build -v ./...
        working-directory: base

      - name: Build cloud
        run: go build -v ./...
        working-directory: cloud

      - name: Build ai
        run: go build -v ./...
        working-directory: ai

      - name: Build allkite
        run: go build -v ./...
        working-directory: allkite

      - name: Build wasm
        run: go build -v ./...
        working-directory: wasm

      - name: Test libkite
        run: go test -race ./...
        working-directory: libkite

      - name: Test base
        run: go test -race ./...
        working-directory: base

      - name: Test cloud
        run: go test -race ./...
        working-directory: cloud

      - name: Test ai
        run: go test -race ./...
        working-directory: ai

      - name: Test allkite
        run: go test -race ./...
        working-directory: allkite
