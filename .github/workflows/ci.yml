name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: |
            starbase/go.sum
            core/go.sum
            cloud/go.sum
            ai/go.sum
            wasm/go.sum

      - name: Build starbase
        run: go build -v ./...
        working-directory: starbase

      - name: Build core
        run: go build -v ./...
        working-directory: core

      - name: Build cloud
        run: go build -v ./...
        working-directory: cloud

      - name: Build ai
        run: go build -v ./...
        working-directory: ai

      - name: Build wasm
        run: go build -v ./...
        working-directory: wasm

      - name: Test starbase
        run: go test -race ./...
        working-directory: starbase

      - name: Test core
        run: go test -race ./...
        working-directory: core

      - name: Test cloud
        run: go test -race ./...
        working-directory: cloud

      - name: Test ai
        run: go test -race ./...
        working-directory: ai
